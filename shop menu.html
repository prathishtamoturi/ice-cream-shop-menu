<!DOCTYPE html>
<html>
<head>
<title>Ice Cream Shop</title>

<style>

body{
    font-family: Arial, sans-serif;
    margin: 20px;
    background-color: #fff8f0;
}

h1{
    text-align: center;
    color: deeppink;
}

/* Sibling Selector */
h1 + p{
    color: blue;
    font-weight: bold;
    text-align: center;
}

.description::first-letter{
    font-size: 30px;
    color: rgb(237, 152, 152);
}

.flavours > li{
    padding: 5px;
}

.flavours li:nth-child(odd){
    background-color: lightyellow;
}

.flavours li:nth-child(even){
    background-color: lightpink;
}

button:hover{
    background-color: rgb(244, 116, 116);
    color: white;
}

button{
    padding: 10px;
}

</style>
</head>

<body>

<h1>Cool Cone Ice Cream Shop</h1>

<p>Welcome to our sweet ice cream shop!</p>

<p class="description">
We serve fresh and tasty ice creams in many delicious flavours.
</p>

<h2>Ice Cream Flavours</h2>

<ul class="flavours">
    <li>Vanilla - ₹80</li>
    <li>Chocolate - ₹90</li>
    <li>Strawberry - ₹85</li>
    <li>Mango - ₹95</li>
    <li>Butterscotch - ₹100</li>
</ul>

<button>Order Now</button>

</body>
</html>
